<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back! - Banana Math Rush</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="bg-floating">
        <span class="floating-icon" style="top: 10%; left: 5%;">🍌</span>
        <span class="floating-icon" style="top: 30%; left: 80%;">🐒</span>
        <span class="floating-icon" style="top: 70%; left: 15%;">🌴</span>
        <span class="floating-icon" style="top: 85%; left: 75%;">🍌</span>
    </div>

    <div class="auth-container">
        <button id="themeToggle" class="btn-theme"
            style="position: absolute; top: 1rem; right: 1rem; width: 35px; height: 35px; font-size: 1.2rem;"
            title="Toggle Dark Mode">🌓</button>
        <span class="auth-icon">🔑</span>
        <h1>Welcome Back!</h1>
        <p class="text-muted">Type your info to keep catching bananas!</p>

        <p id="message"></p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="naduni" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••" required>
            </div>
            <button type="submit">Login 🚀</button>
        </form>

        <p class="mt-4 text-muted">Don't have an account? <a href="register.html"
                style="color: var(--primary-orange-hover); font-weight: 800; text-decoration: underline;">Sign up now!
                🚀</a></p>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('themeToggle')?.addEventListener('click', () => {
            ThemeManager.toggle();
        });
    </script>
</body>

</html>
