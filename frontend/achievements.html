<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements - Banana Math Rush</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
            margin-top: 2rem;
        }

        .achievement-card {
            background: var(--white);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: var(--card-shadow);
            text-align: center;
            transition: var(--transition);
            opacity: 0.6;
            filter: grayscale(1);
            position: relative;
            overflow: hidden;
        }

        .achievement-card.earned {
            opacity: 1;
            filter: grayscale(0);
            border: 3px solid var(--primary-orange);
        }

        .achievement-card.earned::after {
            content: 'EARNED';
            position: absolute;
            top: 1rem;
            right: -2rem;
            background: var(--primary-orange);
            color: var(--text-dark);
            font-size: 0.6rem;
            font-weight: 800;
            padding: 0.25rem 2rem;
            transform: rotate(45deg);
        }

        .achievement-card h3 {
            font-size: 1.125rem;
            margin: 1rem 0 0.5rem;
        }

        .achievement-card p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .lock-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="bg-floating">
        <span class="floating-icon" style="top: 10%; left: 10%;">✨</span>
        <span class="floating-icon" style="top: 30%; left: 85%;">🍌</span>
        <span class="floating-icon" style="top: 70%; left: 15%;">🐒</span>
    </div>

    <nav>
        <a href="index.html">Dashboard</a>
        <a href="game.html">Play Game</a>
        <a href="leaderboard.html">Rankings</a>
        <div class="diamond-hud" style="margin-left: auto;">
            <span class="icon">💎</span>
            <span id="diamondCount">0</span>
        </div>
    </nav>

    <div class="hero">
        <h1>Your Achievements</h1>
        <p>Unlock all badges to become the Ultimate Banana Master! 🐒✨</p>
    </div>

    <div class="achievement-grid" id="achievementsGrid">
        <!-- Achievements will be loaded here -->
    </div>

    <script src="js/api.js"></script>
    <script>
        // Check authentication
        if (!localStorage.getItem('username')) {
            window.location.href = 'login.html';
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadDiamonds();
            loadAchievements();
        });

        function loadDiamonds() {
            fetchProfile().then(res => {
                if (res.status === "success") {
                    document.getElementById("diamondCount").innerText = res.data.diamonds;
                }
            });
        }

        function loadAchievements() {
            const grid = document.getElementById("achievementsGrid");
            fetchAchievements().then(achievements => {
                grid.innerHTML = '';
                achievements.forEach(ach => {
                    const card = document.createElement("div");
                    const isEarned = ach.earned == 1;
                    const isClaimed = ach.is_claimed == 1;

                    card.className = `achievement-card ${isEarned ? 'earned' : ''}`;

                    let content = '';
                    if (!isEarned) {
                        content = `<div class="lock-icon">🔒</div><h3>${ach.name}</h3><p>${ach.description}</p>`;
                    } else if (isEarned && !isClaimed) {
                        content = `<div class="gift-box" onclick="claim('${ach.name}', this)">🎁</div><h3>Earned!</h3><p>Tap the gift to reveal ${ach.diamond_value} diamonds!</p>`;
                    } else {
                        content = `<div class="lock-icon">🌟</div><h3>${ach.name}</h3><p>${ach.description}</p>`;
                    }

                    card.innerHTML = content;
                    grid.appendChild(card);
                });
            });
        }

        function claim(name, el) {
            el.innerText = '✨';
            claimReward(name).then(result => {
                if (result.status === 'success') {
                    spawnDiamonds(result.reward, el);

                    // Wait for animation
                    setTimeout(() => {
                        location.reload();
                    }, 1000);
                }
            });
        }

        function spawnDiamonds(count, originElement) {
            const rect = originElement.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const d = document.createElement("div");
                    d.className = "diamond-particle";
                    d.innerText = "💎";
                    d.style.left = startX + "px";
                    d.style.top = startY + "px";
                    document.body.appendChild(d);

                    // Burst math
                    const angle = Math.random() * Math.PI * 2;
                    const destX = (Math.cos(angle) * 150) + (Math.random() - 0.5) * 50;
                    const destY = (Math.sin(angle) * 150) + (Math.random() - 0.5) * 50;

                    const anim = d.animate([
                        { transform: 'translate(0, 0) scale(0)', opacity: 0 },
                        { transform: `translate(${destX / 2}px, ${destY / 2}px) scale(1.5)`, opacity: 1, offset: 0.2 },
                        { transform: `translate(${destX}px, ${destY}px) scale(1)`, opacity: 0 }
                    ], {
                        duration: 1000 + Math.random() * 500,
                        easing: "cubic-bezier(0.175, 0.885, 0.32, 1.275)"
                    });
                    anim.onfinish = () => d.remove();
                }, i * 50);
            }
        }
    </script>
</body>

</html>
