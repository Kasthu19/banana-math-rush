<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Banana Fun! - Banana Math Rush</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="bg-floating">
        <span class="floating-icon" style="top: 15%; left: 10%;">🎉</span>
        <span class="floating-icon" style="top: 25%; left: 85%;">🍌</span>
        <span class="floating-icon" style="top: 60%; left: 5%;">🐒</span>
        <span class="floating-icon" style="top: 80%; left: 90%;">✨</span>
    </div>

    <div class="auth-container">
        <button id="languageToggle" class="btn-lang" onclick="i18n.toggle()" style="top: 1rem; right: 4rem; height: 35px;">தமிழ்</button>
        <button id="themeToggle" class="btn-theme"
            style="position: absolute; top: 1rem; right: 1.5rem; width: 35px; height: 35px; font-size: 1.2rem;"
            title="Toggle Dark Mode">🌓</button>
        <span class="auth-icon" style="font-size: 5rem;">🍌</span>
        <h1 data-i18n="join_fun">Join the Banana Fun!</h1>
        <p class="text-muted" data-i18n="register_subtitle">Create an account to start your adventure!</p>

        <p id="message"></p>

        <form id="registerForm">
            <div class="form-group">
                <label for="username" data-i18n="username">Username</label>
                <input type="text" id="username" data-i18n="username_placeholder" placeholder="Choose a cool username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email" data-i18n="email">Email</label>
                <input type="email" id="email" data-i18n="email_placeholder" placeholder="Your best email" required>
            </div>
            <div class="form-group">
                <label for="password" data-i18n="password">Password</label>
                <input type="password" id="password" data-i18n="password_placeholder" placeholder="Make it strong!" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword" data-i18n="confirm_password">Confirm Password</label>
                <input type="password" id="confirmPassword" data-i18n="password_placeholder" placeholder="One more time!" required>
            </div>
            <button type="submit" data-i18n="lets_go">Let's Go! ✨</button>
        </form>

        <p class="mt-4 text-muted"><span data-i18n="have_account">Already have an account?</span> <a href="login.html"
                style="color: var(--primary-orange-hover); font-weight: 800; text-decoration: underline;" data-i18n="login_here">Log in here!
                🍌</a></p>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('themeToggle')?.addEventListener('click', () => {
            ThemeManager.toggle();
        });
    </script>
</body>

</html>
