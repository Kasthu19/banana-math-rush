<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Banana Fun! - Banana Math Rush</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="bg-floating">
        <span class="floating-icon" style="top: 15%; left: 10%;">🎉</span>
        <span class="floating-icon" style="top: 25%; left: 85%;">🍌</span>
        <span class="floating-icon" style="top: 60%; left: 5%;">🐒</span>
        <span class="floating-icon" style="top: 80%; left: 90%;">✨</span>
    </div>

    <div class="auth-container">
        <button id="themeToggle" class="btn-theme"
            style="position: absolute; top: 1rem; right: 1rem; width: 35px; height: 35px; font-size: 1.2rem;"
            title="Toggle Dark Mode">🌓</button>
        <span class="auth-icon" style="font-size: 5rem;">🍌</span>
        <h1>Join the Banana Fun!</h1>
        <p class="text-muted">Create an account to start your adventure!</p>

        <p id="message"></p>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Choose a cool username" required autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Your best email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Make it strong!" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="One more time!" required>
            </div>
            <button type="submit">Let's Go! ✨</button>
        </form>

        <p class="mt-4 text-muted">Already have an account? <a href="login.html"
                style="color: var(--primary-orange-hover); font-weight: 800; text-decoration: underline;">Log in here!
                🍌</a></p>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('themeToggle')?.addEventListener('click', () => {
            ThemeManager.toggle();
        });
    </script>
</body>

</html>
